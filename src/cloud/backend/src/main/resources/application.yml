spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:seniorwatch}
    username: ${DB_USER:sw_app}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
  sql:
    init:
      mode: never

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  tomcat:
    max-threads: 50

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-min-256-bits}
  expiry-seconds: ${JWT_EXPIRY_SECONDS:3600}

aws:
  region: ${AWS_REGION_APP:eu-central-1}
  s3:
    reports-bucket: ${S3_REPORTS_BUCKET:}
  sns:
    alerts-topic-arn: ${SNS_ALERTS_TOPIC_ARN:}

logging:
  level:
    root: INFO
    ro.seniorwatch: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
