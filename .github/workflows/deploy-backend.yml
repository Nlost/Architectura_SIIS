name: Deploy Backend to Elastic Beanstalk

on:
  push:
    branches: [master]
    paths:
      - 'src/cloud/backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn clean package -DskipTests
        working-directory: src/cloud/backend

      - name: Create deploy ZIP
        run: |
          cd src/cloud/backend
          cp Dockerfile target/Dockerfile
          cd target
          zip seniorwatch-deploy.zip Dockerfile seniorwatch-cloud.jar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Upload ZIP to S3
        run: |
          aws s3 cp src/cloud/backend/target/seniorwatch-deploy.zip \
            s3://seniorwatch-reports-31m9/deploys/seniorwatch-${{ github.sha }}.zip

      - name: Create EB application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name seniorwatch-cloud \
            --version-label "gh-${{ github.sha }}" \
            --source-bundle S3Bucket=seniorwatch-reports-31m9,S3Key=deploys/seniorwatch-${{ github.sha }}.zip

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name seniorwatch-dev \
            --version-label "gh-${{ github.sha }}"
