name: Deploy Backend to Elastic Beanstalk

on:
  push:
    branches: [master]
    paths:
      - 'src/cloud/backend/**'

env:
  AWS_REGION:   eu-central-1
  ECR_REPO:     096506568929.dkr.ecr.eu-central-1.amazonaws.com/seniorwatch-backend
  EB_APP_NAME:  seniorwatch-cloud
  EB_ENV_NAME:  seniorwatch-dev
  S3_BUCKET:    seniorwatch-reports-31m9

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn clean package -DskipTests
        working-directory: src/cloud/backend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR repository (if not exists)
        run: |
          aws ecr describe-repositories --repository-names seniorwatch-backend 2>/dev/null || \
          aws ecr create-repository --repository-name seniorwatch-backend

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image to ECR
        run: |
          IMAGE_TAG="${{ github.sha }}"
          docker build -t $ECR_REPO:$IMAGE_TAG -t $ECR_REPO:latest \
            -f src/cloud/backend/Dockerfile src/cloud/backend/
          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:latest

      - name: Create deployment bundle
        run: |
          cat > Dockerrun.aws.json <<EOF
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "$ECR_REPO:${{ github.sha }}",
              "Update": "true"
            },
            "Ports": [{ "ContainerPort": 8080, "HostPort": 8080 }],
            "Logging": "/var/log/app"
          }
          EOF
          # Point the EB health check at the app's actual path (context-path is /api),
          # otherwise EB probes "/" -> 404 -> environment health stays Yellow.
          mkdir -p .ebextensions
          cat > .ebextensions/01-healthcheck.config <<'EOF'
          option_settings:
            aws:elasticbeanstalk:application:
              Application Healthcheck URL: /api/actuator/health
            aws:elasticbeanstalk:environment:process:default:
              HealthCheckPath: /api/actuator/health
          EOF
          zip -r seniorwatch-deploy.zip Dockerrun.aws.json .ebextensions

      - name: Upload ZIP to S3
        run: |
          aws s3 cp seniorwatch-deploy.zip \
            s3://$S3_BUCKET/deploys/seniorwatch-${{ github.sha }}.zip

      - name: Create EB application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name $EB_APP_NAME \
            --version-label "$VERSION_LABEL" \
            --source-bundle S3Bucket=$S3_BUCKET,S3Key=deploys/seniorwatch-${{ github.sha }}.zip
        env:
          VERSION_LABEL: gh-${{ github.sha }}-${{ github.run_number }}.${{ github.run_attempt }}

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name $EB_ENV_NAME \
            --version-label "$VERSION_LABEL"
        env:
          VERSION_LABEL: gh-${{ github.sha }}-${{ github.run_number }}.${{ github.run_attempt }}

      - name: Wait for deployment
        run: |
          echo "Astept finalizarea deploy-ului (max 10 minute)..."
          aws elasticbeanstalk wait environment-updated \
            --application-name $EB_APP_NAME \
            --environment-names $EB_ENV_NAME || true

          # Health can lag behind the environment update completing, so poll until
          # the environment is Ready AND health is Green/Ok (or until we time out).
          DEADLINE=$((SECONDS + 600))
          HEALTH=""
          while [ $SECONDS -lt $DEADLINE ]; do
            read HEALTH HEALTH_STATUS ENV_STATUS < <(aws elasticbeanstalk describe-environments \
              --application-name $EB_APP_NAME \
              --environment-names $EB_ENV_NAME \
              --query "Environments[0].[Health,HealthStatus,Status]" --output text)
            echo "Stare EB: Health=$HEALTH HealthStatus=$HEALTH_STATUS Status=$ENV_STATUS"
            if [ "$ENV_STATUS" = "Ready" ] && { [ "$HEALTH" = "Green" ] || [ "$HEALTH" = "Ok" ]; }; then
              echo "Deploy reusit!"
              exit 0
            fi
            sleep 20
          done

          echo "Deploy esuat! Ultima stare: Health=$HEALTH"
          echo "----- Ultimele evenimente EB -----"
          aws elasticbeanstalk describe-events \
            --application-name $EB_APP_NAME \
            --environment-name $EB_ENV_NAME \
            --max-items 20 \
            --query "Events[].[EventDate,Severity,Message]" --output text || true
          exit 1
