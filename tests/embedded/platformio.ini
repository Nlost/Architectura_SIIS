[platformio]
src_dir     = ../../src/embedded/src
include_dir = ../../src/embedded/include
lib_dir     = lib
test_dir    = test

[env:native]
platform        = native
test_framework  = unity
build_flags     =
    -std=gnu++17
    -Wno-deprecated-declarations
    -DUNIT_TEST
lib_deps        =
    ArduinoStub
    SeniorWatchCore
